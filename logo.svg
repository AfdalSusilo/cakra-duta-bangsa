<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="50%" style="stop-color:#e8c96a"/>
      <stop offset="100%" style="stop-color:#d4a843"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276"/>
      <stop offset="100%" style="stop-color:#0a3d62"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8922e"/>
      <stop offset="50%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#c9a03a"/>
    </linearGradient>
  </defs>

  <!-- Globe -->
  <circle cx="200" cy="180" r="85" fill="url(#globeGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- Globe lines - longitude -->
  <ellipse cx="200" cy="180" rx="30" ry="85" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <ellipse cx="200" cy="180" rx="60" ry="85" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="200" y1="95" x2="200" y2="265" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  
  <!-- Globe lines - latitude -->
  <ellipse cx="200" cy="180" rx="85" ry="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <ellipse cx="200" cy="180" rx="85" ry="60" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="115" y1="180" x2="285" y2="180" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  
  <!-- Continents simplified -->
  <path d="M170 140 Q180 130 195 135 Q205 138 210 145 Q215 155 210 165 Q200 170 185 165 Q175 160 170 150 Z" fill="#2ecc71" opacity="0.7"/>
  <path d="M220 155 Q235 148 245 155 Q250 165 245 175 Q235 180 225 175 Q218 168 220 155 Z" fill="#2ecc71" opacity="0.7"/>
  <path d="M155 190 Q165 185 175 190 Q180 200 175 210 Q165 215 155 210 Q150 200 155 190 Z" fill="#2ecc71" opacity="0.7"/>
  
  <!-- Arrow -->
  <g transform="translate(200,180) rotate(-25)">
    <!-- Arrow shaft -->
    <rect x="-100" y="-6" width="200" height="12" rx="3" fill="url(#arrowGrad)"/>
    
    <!-- Arrow head -->
    <polygon points="100,-20 130,0 100,20" fill="url(#arrowGrad)"/>
    
    <!-- Arrow fletching -->
    <polygon points="-100,-6 -85,-22 -70,-6" fill="#c9a03a" opacity="0.8"/>
    <polygon points="-100,6 -85,22 -70,6" fill="#c9a03a" opacity="0.8"/>
    <polygon points="-75,-6 -60,-18 -45,-6" fill="#b8922e" opacity="0.7"/>
    <polygon points="-75,6 -60,18 -45,6" fill="#b8922e" opacity="0.7"/>
  </g>
  
  <!-- Star -->
  <polygon points="200,65 206,82 224,82 210,93 216,110 200,100 184,110 190,93 176,82 194,82" fill="url(#goldGrad)" stroke="#b8922e" stroke-width="1"/>
  
  <!-- Left garland - leaves -->
  <g transform="translate(105,200)" fill="#27ae60" stroke="#1e8449" stroke-width="1">
    <ellipse cx="0" cy="-10" rx="8" ry="15" transform="rotate(-20)"/>
    <ellipse cx="-15" cy="0" rx="8" ry="15" transform="rotate(-40)"/>
    <ellipse cx="-25" cy="15" rx="8" ry="15" transform="rotate(-55)"/>
    <ellipse cx="-30" cy="35" rx="8" ry="15" transform="rotate(-70)"/>
    <ellipse cx="10" cy="-15" rx="7" ry="13" transform="rotate(-5)"/>
    <ellipse cx="15" cy="5" rx="7" ry="13" transform="rotate(10)"/>
    <ellipse cx="12" cy="25" rx="7" ry="13" transform="rotate(-10)"/>
  </g>
  
  <!-- Right garland - wheat -->
  <g transform="translate(295,200)" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1">
    <ellipse cx="0" cy="-10" rx="6" ry="12" transform="rotate(20)"/>
    <ellipse cx="15" cy="0" rx="6" ry="12" transform="rotate(40)"/>
    <ellipse cx="25" cy="15" rx="6" ry="12" transform="rotate(55)"/>
    <ellipse cx="30" cy="35" rx="6" ry="12" transform="rotate(70)"/>
    <ellipse cx="-10" cy="-15" rx="5" ry="10" transform="rotate(5)"/>
    <ellipse cx="-15" cy="5" rx="5" ry="10" transform="rotate(-10)"/>
    <ellipse cx="-12" cy="25" rx="5" ry="10" transform="rotate(10)"/>
  </g>
  
  <!-- Banner/Ribbon -->
  <path d="M100,290 Q120,275 200,270 Q280,275 300,290 L290,310 Q270,298 200,293 Q130,298 110,310 Z" fill="url(#goldGrad)" stroke="#b8922e" stroke-width="2"/>
  
  <!-- Banner ends -->
  <path d="M100,290 L85,280 L95,300 L110,310 Z" fill="#c9a03a"/>
  <path d="M300,290 L315,280 L305,300 L290,310 Z" fill="#c9a03a"/>
  
  <!-- Banner fold shadows -->
  <path d="M110,310 Q130,298 200,293 Q270,298 290,310 L285,318 Q265,308 200,303 Q135,308 115,318 Z" fill="#b8922e" opacity="0.5"/>
  
  <!-- Text on banner -->
  <text x="200" y="302" font-family="serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">CV. CAKRA DUTA BANGSA</text>
</svg>
